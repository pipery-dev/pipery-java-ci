owner = "pipery-dev"
action_name = "pipery-java-ci"
title = "Pipery Java CI"
description = "CI pipeline for Java: SAST, SCA, lint, build, test, versioning, packaging, release, reintegration"
marketplace_category = "continuous-integration"
author = "pipery-dev"
action_type = "composite"
default_branch = "main"
version = "1.0.0"
repository_visibility = "public"
icon = "assets/icon.png"
simple_icon = "openjdk"
test_command = ""
test_project_path = "test-project"
test_project_input = "project_path"
test_log_path = "pipery.jsonl"
test_log_success_values = ["success", "succeeded", "passed", "ok"]
cleanup_paths = ["pipery.jsonl"]

[[inputs]]
name = "project_path"
description = "Path to the project source tree the action should operate on."
required = false
default = "."

[[inputs]]
name = "config_file"
description = "Path to Pipery config file."
required = false
default = ".github/pipery/config.yaml"

[[inputs]]
name = "java_version"
description = "Java version to use."
required = false
default = "21"

[[inputs]]
name = "build_tool"
description = "Build tool to use: auto, maven, gradle, or groovy."
required = false
default = "auto"

[[inputs]]
name = "tests_path"
description = "Test target passed to the build tool (e.g. a test class or pattern)."
required = false
default = ""

[[inputs]]
name = "registry"
description = "Container registry for packaging."
required = false
default = "ghcr.io"

[[inputs]]
name = "registry_username"
description = "Registry username for authentication."
required = false
default = ""

[[inputs]]
name = "registry_password"
description = "Registry password for authentication."
required = false
default = ""

[[inputs]]
name = "github_token"
description = "GitHub token for release and reintegration steps."
required = false
default = ""

[[inputs]]
name = "version_bump"
description = "Version bump type: patch, minor, or major."
required = false
default = "patch"

[[inputs]]
name = "log_file"
description = "Path to the JSONL log file written during the run."
required = false
default = "pipery.jsonl"

[[inputs]]
name = "skip_sast"
description = "Skip SAST step."
required = false
default = "false"

[[inputs]]
name = "skip_sca"
description = "Skip SCA step."
required = false
default = "false"

[[inputs]]
name = "skip_lint"
description = "Skip lint step."
required = false
default = "false"

[[inputs]]
name = "skip_build"
description = "Skip build step."
required = false
default = "false"

[[inputs]]
name = "skip_test"
description = "Skip test step."
required = false
default = "false"

[[inputs]]
name = "skip_versioning"
description = "Skip versioning step."
required = false
default = "false"

[[inputs]]
name = "skip_packaging"
description = "Skip packaging step."
required = false
default = "false"

[[inputs]]
name = "skip_release"
description = "Skip release step."
required = false
default = "false"

[[inputs]]
name = "skip_reintegration"
description = "Skip reintegration step."
required = false
default = "false"

[[inputs]]
name = "target_branch"
description = "Target branch for reintegration."
required = false
default = "main"

[[test_log_required_fields]]
name = "event"
value = "build"

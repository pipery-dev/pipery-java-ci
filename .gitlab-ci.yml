# GitLab CI Pipeline for pipery-java-ci
# Java/Maven/Gradle build and test

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".github/pipery/config.yaml"
  JAVA_VERSION: "21"
  BUILD_TOOL: "auto"  # auto, maven, gradle, groovy
  TESTS_PATH: ""
  REGISTRY: "ghcr.io"
  REGISTRY_USERNAME: ""
  VERSION_BUMP: "patch"
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"
  GITHUB_TOKEN: ""

stages:
  - checkout
  - setup
  - sast
  - sca
  - lint
  - build
  - test
  - versioning
  - packaging
  - release
  - reintegration
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository checked out"

setup:
  stage: setup
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  script:
    - java -version
    - mvn --version
    - cd $PROJECT_PATH
    - mvn dependency:download-sources
    - echo "Setup complete"

sast_scan:
  stage: sast
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install pipery-tooling
  script:
    - echo "Running Java SAST scan..."
    - pipery-tooling sast --project-path $PROJECT_PATH --config $CONFIG_FILE --log-file $LOG_FILE
    - cd $PROJECT_PATH
    - mvn spotbugs:check || true
  allow_failure: true
  rules:
    - if: '$SKIP_SAST == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

sca_scan:
  stage: sca
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  before_script:
    - pip install pipery-tooling
  script:
    - echo "Running Java SCA scan..."
    - pipery-tooling sca --project-path $PROJECT_PATH --config $CONFIG_FILE --log-file $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SCA == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

lint:
  stage: lint
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  script:
    - cd $PROJECT_PATH
    - mvn checkstyle:check || true
  allow_failure: true
  rules:
    - if: '$SKIP_LINT == "true"'
      when: never
    - when: on_success

build:
  stage: build
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  dependencies:
    - setup
  script:
    - cd $PROJECT_PATH
    - mvn clean package -DskipTests
  rules:
    - if: '$SKIP_BUILD == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $PROJECT_PATH/target/
    expire_in: 1 day

test:
  stage: test
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  dependencies:
    - build
  script:
    - cd $PROJECT_PATH
    - mvn test
  rules:
    - if: '$SKIP_TEST == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $PROJECT_PATH/target/surefire-reports/
      - $PROJECT_PATH/target/jacoco-report/
    reports:
      junit: $PROJECT_PATH/target/surefire-reports/TEST-*.xml
    expire_in: 30 days

versioning:
  stage: versioning
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install pipery-tooling
  script:
    - echo "Running versioning step..."
    - pipery-tooling version --project-path $PROJECT_PATH --version-bump $VERSION_BUMP --log-file $LOG_FILE
    - cd $PROJECT_PATH
    - grep "^<version>" pom.xml | head -1 > version_info.txt
  artifacts:
    paths:
      - version_info.txt
      - $LOG_FILE
    expire_in: 30 days
  rules:
    - if: '$SKIP_VERSIONING == "true"'
      when: never
    - when: on_success

packaging:
  stage: packaging
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  dependencies:
    - build
  script:
    - cd $PROJECT_PATH
    - echo "Java package ready: $(find target -name '*.jar' | head -1)"
  rules:
    - if: '$SKIP_PACKAGING == "true"'
      when: never
    - when: on_success

release:
  stage: release
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  script:
    - cd $PROJECT_PATH
    - echo "Publishing Java artifacts to registry..."
    - echo "Release complete"
  rules:
    - if: '$SKIP_RELEASE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual

reintegration:
  stage: reintegration
  image: alpine:latest
  script:
    - |
      [ -z "$GITHUB_TOKEN" ] && exit 0
      echo "Reintegration would update target branch"
  rules:
    - if: '$SKIP_REINTEGRATION == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "Java pipeline complete"
  artifacts:
    paths:
      - $LOG_FILE
      - version_info.txt
    expire_in: 90 days
  when: always
